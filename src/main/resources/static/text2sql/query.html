<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<title>AI生成式图表</title>
	<link href="/webjars/bootstrap/5.3.5/css/bootstrap.min.css" rel="stylesheet">
	<script src="/webjars/jquery/3.7.1/jquery.min.js"></script>
	<script src="/webjars/echarts/5.5.0/echarts.min.js"></script>
	<style>
		body {
			padding-top: 40px;
			background-color: #eee;
		}
		button[type="submit"] {
			width: 200px;
		}
		.conversation {
			margin-top: 5rem;
			padding: 10px;
			border: 1px solid #b8daff;
			border-radius: .5rem;
		}
		.question {
			text-align: center;
			font-weight: bolder;
		}
		.answer {
			margin-top: 2rem;
		}
		.answer.loading {
			text-align: center;
			height: 100px;
		}
		.answer.loading .spinner-grow {
			margin-right: 1rem;
		}
		.answer.text {
			padding-left: 100px;
			padding-right: 100px;
		}
		.answer.echarts {
			height: 400px;
		}
	</style>
	<script>
		$(function () {
			var queryingText = false;
			var form = $('#query-form');
			var input = form.find('input[name="query"]');
			var submit = form.find('submit');
			input.keypress(function(event) {
				if (event.which === 13) {
					input.blur();
					form.submit();
					event.preventDefault();
				}
			});
			$.ajaxSetup({
			  beforeSend: function() {
			  	if (!queryingText) {
			  		input.attr('readonly', 'readonly');
					submit.attr('disabled', 'disabled').html('<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>正在查询...');
			  	}
			  },
			  complete: function() {
			  	if (!queryingText) {
					input.removeAttr('readonly');
					submit.removeAttr('disabled').html('查询');
				}
			  }
			});

			$('#query-form').on('submit', function (e) {
				var query = $.trim(input.val());
				if (!query) {
					return false;
				}
				input.val('');
				var conversation = $('<div class="conversation"><div class="question"></div><div class="answer"></div></div>').insertAfter(form);
				conversation.find('.question').text(query);
				var answer = conversation.find('.answer').addClass('loading').html('<div class="spinner-grow text-primary" role="status"></div><div class="spinner-grow text-success" role="status"></div><div class="spinner-grow text-warning" role="status"></div>');
				conversation[0].scrollIntoView({behavior: 'smooth'});
				$.post('echarts', {'query': query}, function(data) {
					try {
						if (typeof data == 'string') {
							data = $.trim(data);
							if (data.startsWith('{') && data.endsWith('}')) {
								data = JSON.parse(data);
							} else {
								answer.removeClass('loading').addClass('text').html(data);
								return false;
							}
						}
						$(data.series).each(function(index, item) {
							item.label = {
								'show': true,
								'position': 'top'
							};
						});
						var chart = echarts.init(answer.removeClass('loading').addClass('echarts')[0]);
						chart.setOption(data);
					} catch(e) {
					}
					if (answer.find('canvas').length == 0) {
						// fallback to text query
						queryingText = true;
						$.post('query', {'query': query}, function(data) {
							answer.removeClass('echarts').addClass('text').html(data);
							queryingText = false;
						});
					}
				});
				return false;
			});

		});
	</script>
</head>

<body>
<div class="container">
	<form id="query-form">
		<div class="input-group">
			<input type="text" name="query" class="form-control rounded" placeholder="请输入关于数据统计分析的问题？"/>
			<button type="submit" class="btn btn-primary">查询</button>
		</div>
	</form>
</div>
</body>

</html>
